<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0B0F1C;
            overflow: hidden;
        }

        .loading-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 40px 24px;
        }

        /* ===== Background ===== */

        .bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }

        .glow-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.08), transparent 70%);
            top: -150px;
            left: -150px;
            animation: glow-drift 10s ease-in-out infinite;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(123, 63, 228, 0.10), transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: glow-drift 13s ease-in-out infinite reverse;
        }

        @keyframes glow-drift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }

        /* ===== Logo ===== */

        .logo-wrapper {
            position: relative;
            z-index: 2;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            animation: logoPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.5));
        }

        @keyframes logoPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
            }
        }

        /* ===== Text ===== */

        .loading-text {
            z-index: 2;
            color: #F5F7FA;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .6;
            }
        }

        /* ===== Progress Bar ===== */

        .progress-wrapper {
            width: 260px;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            z-index: 2;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00E5FF, #7B3FE4);
            animation: loadingBar 4s ease-in-out infinite;
        }

        @keyframes loadingBar {
            0% {
                width: 0%;
            }

            50% {
                width: 80%;
            }

            100% {
                width: 100%;
            }
        }

        .loading-hint {
            margin-top: 15px;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(155, 163, 175, .6);
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <section class="loading-page">

        <div class="bg">
            <div class="grid-lines"></div>
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
        </div>

        <div class="logo-wrapper">
            <img src="TemplateData/webgl-logo.png" class="logo-img">
        </div>

        <div class="loading-text">
            LOADING EXPERIENCE
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>

        <div class="loading-hint">
            Initializing Metaverse Environment...
        </div>

    </section>
    <script>
        window.addEventListener("load", function () {

            // إنشاء iframe مخفي لتحميل المشروع في الخلفية
            const iframe = document.createElement("iframe");
            iframe.src = "index.html";
            iframe.style.display = "none";
            document.body.appendChild(iframe);

            // انتظار رسالة من صفحة المشروع
            window.addEventListener("message", function (event) {
                if (event.data === "PROJECT_READY") {

                    // تحويل المستخدم للمشروع
                    window.location.href = "index.html";
                }
            });

        });
    </script>
</body>

</html>
